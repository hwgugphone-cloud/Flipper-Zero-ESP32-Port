name: Build Flipper ESP32 6-Button

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build esp32s3_6buttons
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ESP-IDF system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget flex bison gperf python3 python3-pip python3-venv cmake ninja-build ccache libffi-dev libssl-dev dfu-util libusb-1.0-0 libglib2.0-dev

      - name: Setup ESP-IDF
        run: |
          mkdir -p ~/esp
          git clone --branch v5.4.1 --depth 1 https://github.com/espressif/esp-idf.git ~/esp/esp-idf
          cd ~/esp/esp-idf
          ./install.sh esp32s3

      - name: Build
        run: |
          # Kích hoạt môi trường
          source ~/esp/esp-idf/export.sh
          
          # Đảm bảo venv tồn tại và active
          if [ ! -d "$HOME/.espressif/python_env/idf5.4_py3.12_env" ]; then
             python3 -m venv $HOME/.espressif/python_env/idf5.4_py3.12_env
          fi
          source $HOME/.espressif/python_env/idf5.4_py3.12_env/bin/activate
          
          # Build dự án
          chmod +x ./build.sh
          ./build.sh --board 6btn --build-only

      - name: Package artifacts
        run: |
          STAGE="artifact_staging"
          mkdir -p "$STAGE/bootloader" "$STAGE/partition_table"
          cp build_6btn/furi_esp32.bin "$STAGE/furi_esp32.bin"
          cp build_6btn/bootloader/bootloader.bin "$STAGE/bootloader/bootloader.bin"
          cp build_6btn/partition_table/partition-table.bin "$STAGE/partition_table/partition-table.bin"
          if [ -f "build_6btn/flash_project_args" ]; then cp "build_6btn/flash_project_args" "$STAGE/flash_args.txt"; fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flipper-esp32s3-6buttons
          path: artifact_staging/
          retention-days: 30
